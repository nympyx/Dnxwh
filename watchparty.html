<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WatchTogether</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;WatchTogether&quot;,&quot;short_name&quot;:&quot;Watch&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0a0f&quot;,&quot;theme_color&quot;:&quot;%230a0a0f&quot;}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --accent: #c8ff00;
    --accent2: #7c3aed;
    --text: #f0f0f0;
    --muted: #6b6b80;
    --border: #2a2a3a;
    --danger: #ff4444;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOBBY ── */
  #lobby {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  #lobby::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }
  #lobby::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,255,0,0.08) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
  }

  .logo {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 0.3rem;
    position: relative;
    z-index: 1;
  }
  .logo span { color: var(--accent); }

  .tagline {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 3rem;
    position: relative;
    z-index: 1;
  }

  .lobby-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .lobby-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
    background: var(--bg3);
    padding: 5px;
    border-radius: 10px;
  }

  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }
  .tab-btn.active {
    background: var(--accent);
    color: #000;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }

  .field-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.2rem;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,255,0,0.25);
  }
  .btn-primary:active { transform: translateY(0); }

  .hint-box {
    background: rgba(200,255,0,0.05);
    border: 1px solid rgba(200,255,0,0.15);
    border-radius: var(--radius);
    padding: 1rem;
    margin-top: 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .hint-box strong { color: var(--accent); }

  #status-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    margin-top: 1rem;
    min-height: 1.2rem;
    transition: color 0.3s;
  }
  #status-msg.ok { color: var(--accent); }
  #status-msg.err { color: var(--danger); }

  /* ── ROOM ── */
  #room {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #room.active { display: flex; }

  .room-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .room-title {
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: -0.5px;
  }
  .room-title span { color: var(--accent); }

  .room-id-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    color: var(--accent);
    cursor: pointer;
    user-select: all;
    transition: background 0.2s;
  }
  .room-id-badge:hover { background: rgba(200,255,0,0.1); }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .conn-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  .room-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── VIDEO PANEL ── */
  .video-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 0;
  }

  .video-wrap {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
    padding: 2rem;
  }
  .placeholder-icon { font-size: 3.5rem; opacity: 0.4; }
  .placeholder-text { font-size: 0.9rem; line-height: 1.6; }

  #video-el {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }

  #yt-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  /* HOST controls */
  .host-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 0.8rem 1rem;
    display: none;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .host-bar.visible { display: flex; }

  .url-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.9rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    outline: none;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .btn-sm {
    padding: 0.55rem 1rem;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-load { background: var(--accent); color: #000; }
  .btn-load:hover { opacity: 0.85; }

  /* sync controls for native video */
  .sync-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 0.5rem 1rem;
    display: none;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .sync-bar.visible { display: flex; }

  .ctrl-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--border); }

  #progress {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  #time-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── CHAT PANEL ── */
  .chat-panel {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border-left: 1px solid var(--border);
  }

  .chat-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    background: var(--bg3);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 0.82rem;
    line-height: 1.5;
    animation: msgIn 0.2s ease;
    word-break: break-word;
  }
  .msg.mine {
    background: rgba(200,255,0,0.1);
    border: 1px solid rgba(200,255,0,0.15);
  }
  .msg.system {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.2);
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    margin-bottom: 2px;
    font-weight: 500;
  }
  .msg.mine .msg-name { color: var(--accent); }

  .chat-input-wrap {
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.8rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    resize: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    width: 38px;
    cursor: pointer;
    font-size: 1rem;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .chat-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 45vh;
      border-left: none;
      border-top: 2px solid var(--border);
      z-index: 10;
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    .chat-panel.open { transform: translateY(0); }
    .room-body { flex-direction: column; }
    .video-panel { height: 55vh; }
    #chat-toggle { display: flex !important; }
  }

  #chat-toggle {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    padding: 4px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 1.2rem;
    border-radius: 30px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ══════════ LOBBY ══════════ -->
<div id="lobby">
  <div class="logo">Watch<span>Together</span></div>
  <p class="tagline">// sincronía peer-to-peer · sin servidores · sin cuentas</p>

  <div class="lobby-card">
    <div class="lobby-tabs">
      <button class="tab-btn active" onclick="switchTab('host')">🎬 Crear sala</button>
      <button class="tab-btn" onclick="switchTab('guest')">🎟 Unirse</button>
    </div>

    <!-- HOST TAB -->
    <div class="tab-panel active" id="tab-host">
      <label class="field-label">Tu nombre</label>
      <input class="field-input" id="host-name" placeholder="Ej: Andres" maxlength="20">
      <button class="btn-primary" onclick="createRoom()">Crear sala →</button>
      <div class="hint-box">
        Eres el <strong>host</strong>: cargas el video y controlas la reproducción.<br>
        Tu amiga necesita el código de sala para unirse.
      </div>
    </div>

    <!-- GUEST TAB -->
    <div class="tab-panel" id="tab-guest">
      <label class="field-label">Tu nombre</label>
      <input class="field-input" id="guest-name" placeholder="Ej: Maria" maxlength="20">
      <label class="field-label">Código de sala</label>
      <input class="field-input" id="room-code-input" placeholder="Pega el código aquí" maxlength="20">
      <button class="btn-primary" onclick="joinRoom()">Unirse →</button>
    </div>

    <div id="status-msg"></div>
  </div>
</div>

<!-- ══════════ ROOM ══════════ -->
<div id="room">
  <div class="room-header">
    <div class="room-title">Watch<span>Together</span></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span id="conn-indicator"><span class="conn-dot" id="conn-dot"></span><span id="conn-text" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">esperando...</span></span>
      <span class="room-id-badge" id="room-id-display" onclick="copyRoomId()" title="Click para copiar">📋 ---</span>
      <button id="chat-toggle" onclick="toggleChat()">💬 Chat</button>
    </div>
  </div>

  <div class="room-body">
    <!-- VIDEO -->
    <div class="video-panel">
      <div class="video-wrap" id="video-wrap">
        <div id="video-placeholder">
          <div class="placeholder-icon">🎬</div>
          <div class="placeholder-text">Esperando que el host cargue un video…</div>
        </div>
        <video id="video-el" controls></video>
        <iframe id="yt-frame" allowfullscreen allow="autoplay"></iframe>
      </div>

      <!-- Host: cargar URL -->
      <div class="host-bar" id="host-bar">
        <input class="url-input" id="video-url" placeholder="URL del video (YouTube, Drive, .mp4, .webm)">
        <button class="btn-sm btn-load" onclick="loadVideo()">▶ Cargar</button>
      </div>

      <!-- Sync controls (native video) -->
      <div class="sync-bar" id="sync-bar">
        <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
        <input type="range" id="progress" value="0" min="0" step="0.1">
        <span id="time-display">0:00 / 0:00</span>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        💬 Chat
        <span style="margin-left:auto;font-size:0.7rem;" id="peer-count">0 conectados</span>
      </div>
      <div id="messages"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chat-input" placeholder="Escribe algo..." maxlength="300" onkeydown="chatKey(event)">
        <button class="send-btn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────
let peer, conn, isHost = false, myName = '', roomId = '';
let videoType = null; // 'native' | 'youtube' | 'drive'
let isSeeking = false;
let suppressSync = false;
let chatOpen = false;

const $ = id => document.getElementById(id);

// ─── LOBBY TABS ──────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='host')||(i===1&&t==='guest')));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', (i===0&&t==='host')||(i===1&&t==='guest')));
}

// ─── CREATE ROOM (HOST) ───────────────────────────────
function createRoom() {
  const name = $('host-name').value.trim();
  if (!name) return setStatus('Escribe tu nombre', 'err');
  myName = name;
  isHost = true;
  setStatus('Generando sala...');

  roomId = 'wt-' + Math.random().toString(36).slice(2, 8).toUpperCase();
  peer = new Peer(roomId, { debug: 0 });

  peer.on('open', id => {
    setStatus(`Sala lista. Código: ${id}`, 'ok');
    enterRoom(id);
    $('host-bar').classList.add('visible');
    addSystemMsg('Sala creada. Comparte el código con tu amiga.');
  });

  peer.on('connection', c => {
    conn = c;
    setupConn();
    toast('¡Tu amiga se conectó! 🎉');
  });

  peer.on('error', e => setStatus('Error: ' + e.message, 'err'));
}

// ─── JOIN ROOM (GUEST) ────────────────────────────────
function joinRoom() {
  const name = $('guest-name').value.trim();
  const code = $('room-code-input').value.trim();
  if (!name) return setStatus('Escribe tu nombre', 'err');
  if (!code)  return setStatus('Ingresa el código de sala', 'err');
  myName = name;
  isHost = false;
  roomId = code;
  setStatus('Conectando...');

  peer = new Peer(undefined, { debug: 0 });
  peer.on('open', () => {
    conn = peer.connect(code, { reliable: true });
    conn.on('open', () => {
      setStatus('Conectado!', 'ok');
      enterRoom(code);
      send({ type: 'hello', name: myName });
      addSystemMsg('Conectado a la sala. ¡Listos para ver!');
    });
    conn.on('error', e => setStatus('No se pudo conectar. ¿El código es correcto?', 'err'));
    setupConn();
  });
  peer.on('error', e => setStatus('Error: ' + e.message, 'err'));
}

// ─── SETUP CONNECTION HANDLERS ────────────────────────
function setupConn() {
  const c = conn;
  c.on('open', () => {
    setConnected(true);
    updatePeerCount();
  });
  c.on('data', onData);
  c.on('close', () => {
    setConnected(false);
    addSystemMsg('La otra persona se desconectó.');
    updatePeerCount();
  });
  c.on('error', () => setConnected(false));
}

function setConnected(v) {
  $('conn-dot').className = 'conn-dot' + (v ? ' connected' : '');
  $('conn-text').textContent = v ? 'conectado' : 'desconectado';
}

function updatePeerCount() {
  $('peer-count').textContent = (conn && conn.open) ? '2 conectados' : '1 conectado';
}

// ─── ENTER ROOM ───────────────────────────────────────
function enterRoom(id) {
  $('lobby').style.display = 'none';
  $('room').classList.add('active');
  $('room-id-display').textContent = '📋 ' + id;
}

// ─── RECEIVE DATA ────────────────────────────────────
function onData(data) {
  switch (data.type) {
    case 'hello':
      addSystemMsg(`${data.name} se unió.`);
      updatePeerCount();
      // send current state if host
      if (isHost) send({ type: 'welcome', name: myName });
      break;
    case 'welcome':
      addSystemMsg(`${data.name} (host) te saludó.`);
      break;
    case 'chat':
      addMsg(data.name, data.text, false);
      break;
    case 'load-video':
      if (!isHost) loadVideoRemote(data.url);
      break;
    case 'play':
      if (!isHost) {
        suppressSync = true;
        $('video-el').currentTime = data.time;
        $('video-el').play();
        updatePlayBtn();
        setTimeout(() => suppressSync = false, 500);
      }
      break;
    case 'pause':
      if (!isHost) {
        suppressSync = true;
        $('video-el').currentTime = data.time;
        $('video-el').pause();
        updatePlayBtn();
        setTimeout(() => suppressSync = false, 500);
      }
      break;
    case 'seek':
      if (!isHost) {
        suppressSync = true;
        $('video-el').currentTime = data.time;
        setTimeout(() => suppressSync = false, 300);
      }
      break;
  }
}

// ─── SEND HELPER ─────────────────────────────────────
function send(data) {
  if (conn && conn.open) conn.send(data);
}

// ─── VIDEO LOADING ────────────────────────────────────
function loadVideo() {
  if (!isHost) return;
  const url = $('video-url').value.trim();
  if (!url) return toast('Pega una URL de video primero');
  loadVideoLocal(url);
  send({ type: 'load-video', url });
}

function detectType(url) {
  if (/youtube\.com|youtu\.be/.test(url)) return 'youtube';
  if (/drive\.google\.com/.test(url)) return 'drive';
  if (/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url)) return 'native';
  // try native as fallback
  return 'native';
}

function getYTId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function getDriveId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function hideAllPlayers() {
  $('video-placeholder').style.display = 'none';
  $('video-el').style.display = 'none';
  $('yt-frame').style.display = 'none';
  $('sync-bar').classList.remove('visible');
}

function loadVideoLocal(url) {
  const type = detectType(url);
  videoType = type;
  hideAllPlayers();

  if (type === 'youtube') {
    const id = getYTId(url);
    if (!id) return toast('No se pudo leer el ID de YouTube');
    $('yt-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1`;
    $('yt-frame').style.display = 'block';
    addSystemMsg('Video de YouTube cargado. (El control de sincronización es manual para YT)');
  } else if (type === 'drive') {
    const id = getDriveId(url);
    if (!id) return toast('No se pudo leer el ID de Drive');
    $('yt-frame').src = `https://drive.google.com/file/d/${id}/preview?autoplay=1`;
    $('yt-frame').style.display = 'block';
    addSystemMsg('Video de Drive cargado.');
  } else {
    $('video-el').src = url;
    $('video-el').style.display = 'block';
    $('sync-bar').classList.add('visible');
    $('video-el').load();
    addSystemMsg('Video cargado. ¡A reproducir!');
  }
}

function loadVideoRemote(url) {
  loadVideoLocal(url);
  if (videoType !== 'native') {
    addSystemMsg('El host cargó un video. ¡Dale play cuando quieras!');
  }
}

// ─── NATIVE VIDEO CONTROLS ────────────────────────────
const vid = () => $('video-el');

function togglePlay() {
  if (!vid().src) return;
  if (vid().paused) {
    vid().play();
    if (isHost) send({ type: 'play', time: vid().currentTime });
  } else {
    vid().pause();
    if (isHost) send({ type: 'pause', time: vid().currentTime });
  }
}

function updatePlayBtn() {
  $('play-pause-btn').textContent = vid().paused ? '▶' : '⏸';
}

vid().addEventListener('play', () => { updatePlayBtn(); if (isHost && !suppressSync) send({ type: 'play', time: vid().currentTime }); });
vid().addEventListener('pause', () => { updatePlayBtn(); if (isHost && !suppressSync) send({ type: 'pause', time: vid().currentTime }); });
vid().addEventListener('timeupdate', () => {
  const d = vid().duration || 0;
  const c = vid().currentTime || 0;
  $('progress').max = d;
  $('progress').value = c;
  $('time-display').textContent = fmt(c) + ' / ' + fmt(d);
});

$('progress').addEventListener('input', () => {
  isSeeking = true;
  vid().currentTime = $('progress').value;
});
$('progress').addEventListener('change', () => {
  isSeeking = false;
  if (isHost) send({ type: 'seek', time: vid().currentTime });
});

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

// ─── CHAT ─────────────────────────────────────────────
function sendChat() {
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;
  addMsg(myName, text, true);
  send({ type: 'chat', name: myName, text });
  input.value = '';
}

function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function addMsg(name, text, mine) {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = 'msg' + (mine ? ' mine' : '');
  div.innerHTML = `<div class="msg-name">${escHtml(name)}</div>${escHtml(text)}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMsg(text) {
  const msgs = $('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── UTILS ───────────────────────────────────────────
function setStatus(msg, cls='') {
  const el = $('status-msg');
  el.textContent = msg;
  el.className = cls;
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function copyRoomId() {
  navigator.clipboard.writeText(roomId).then(() => toast('Código copiado: ' + roomId));
}

function toggleChat() {
  chatOpen = !chatOpen;
  $('chat-panel').classList.toggle('open', chatOpen);
}
</script>
